<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e9dcbf" />
    <title>Renacimiento · Hoy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Aplica el tema antes de pintar (evita parpadeo). Por defecto, según la hora:
      // de día claro, de noche oscuro.
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('transformacion.v1') || '{}');
          var theme = (t.settings && t.settings.theme) || 'time';
          var h = new Date().getHours();
          var night = h < 7 || h >= 19;
          var dark =
            theme === 'dark' ||
            (theme === 'time' && night) ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
